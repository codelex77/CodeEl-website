<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeEl Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #060c18;
      color: white;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #001a4d 0%, #003380 50%, #004fa3 100%);
    }
    .login-box {
      background: #0e1626;
      border: 1px solid rgba(30,58,138,0.5);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      text-align: center;
    }
    .login-box h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 8px; }
    .login-box p { color: rgba(147,197,253,0.6); font-size: 0.875rem; margin-bottom: 32px; }
    .login-input {
      width: 100%;
      background: #162035;
      border: 1px solid rgba(30,58,138,0.5);
      color: white;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #3b82f6; }
    .login-btn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #3b82f6; }
    .login-error { color: #f87171; font-size: 0.875rem; margin-top: 12px; display: none; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    header {
      background: rgba(0,26,77,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(30,58,138,0.4);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { height: 36px; width: auto; }
    .header-left span { font-size: 0.875rem; color: rgba(147,197,253,0.6); font-weight: 500; }
    .logout-btn {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.25); }

    .main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

    /* ── KPI CARDS ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .kpi {
      background: #0e1626;
      border: 1px solid rgba(30,58,138,0.4);
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.3s;
    }
    .kpi:hover { border-color: rgba(37,99,235,0.5); }
    .kpi-label { font-size: 0.75rem; font-weight: 600; color: rgba(147,197,253,0.5); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .kpi-value { font-size: 2rem; font-weight: 900; color: #60a5fa; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 1px solid rgba(30,58,138,0.3); padding-bottom: 0; }
    .tab {
      background: none;
      border: none;
      color: rgba(147,197,253,0.5);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
    .tab:hover:not(.active) { color: rgba(147,197,253,0.8); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── SECTION HEADER ── */
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .panel-header h2 { font-size: 1.25rem; font-weight: 700; }
    .refresh-btn {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: #60a5fa;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(59,130,246,0.25); }

    /* ── CARDS ── */
    .item-card {
      background: #0e1626;
      border: 1px solid rgba(30,58,138,0.4);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .item-card:hover { border-color: rgba(37,99,235,0.4); }

    .item-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .item-meta .name { font-weight: 700; font-size: 0.95rem; }
    .item-meta .role { color: rgba(96,165,250,0.7); font-size: 0.8rem; }
    .item-meta .date { color: rgba(147,197,253,0.4); font-size: 0.75rem; margin-left: auto; }
    .item-meta .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 9999px;
      letter-spacing: 0.05em;
    }
    .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .badge-approved { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
    .badge-type {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .item-text { color: rgba(191,219,254,0.75); font-size: 0.875rem; line-height: 1.6; margin-bottom: 16px; }

    .stars-row { display: flex; gap: 3px; margin-bottom: 12px; }
    .s { font-size: 14px; }
    .s.on { color: #facc15; }
    .s.off { color: #1e3a8a; }

    .budget-row { font-size: 0.875rem; color: rgba(147,197,253,0.7); margin-bottom: 12px; }
    .budget-row span { color: #4ade80; font-weight: 700; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
    }
    .btn-approve {
      background: rgba(74,222,128,0.1);
      border-color: rgba(74,222,128,0.3);
      color: #4ade80;
    }
    .btn-approve:hover { background: rgba(74,222,128,0.2); }
    .btn-unapprove {
      background: rgba(251,191,36,0.1);
      border-color: rgba(251,191,36,0.3);
      color: #fbbf24;
    }
    .btn-unapprove:hover { background: rgba(251,191,36,0.2); }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #f87171;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }
    .btn-whatsapp {
      background: rgba(37,211,102,0.1);
      border-color: rgba(37,211,102,0.3);
      color: #25d366;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-whatsapp:hover { background: rgba(37,211,102,0.2); }

    .empty { text-align: center; padding: 64px; color: rgba(147,197,253,0.3); }

    .loading { text-align: center; padding: 40px; color: rgba(147,197,253,0.4); font-size: 0.875rem; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <h1>🔐 CodeEl Admin</h1>
      <p>Enter your password to continue</p>
      <input type="password" class="login-input" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
      <button class="login-btn" onclick="login()">Sign In</button>
      <p class="login-error" id="loginError">Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <div class="header-left">
        <img src="/logo.png" alt="CodeEl" />
        <span>Admin Dashboard</span>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="main">
      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">Total Inquiries</div><div class="kpi-value" id="kpiInquiries">—</div></div>
        <div class="kpi"><div class="kpi-label">Pending Reviews</div><div class="kpi-value" id="kpiPending">—</div></div>
        <div class="kpi"><div class="kpi-label">Approved Reviews</div><div class="kpi-value" id="kpiApproved">—</div></div>
        <div class="kpi"><div class="kpi-label">Avg Rating</div><div class="kpi-value" id="kpiRating">—</div></div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('inquiries', this)">📋 Inquiries</button>
        <button class="tab" onclick="switchTab('testimonials', this)">⭐ Reviews</button>
      </div>

      <!-- INQUIRIES PANEL -->
      <div class="panel active" id="panel-inquiries">
        <div class="panel-header">
          <h2>Project Inquiries</h2>
          <button class="refresh-btn" onclick="loadInquiries()">↻ Refresh</button>
        </div>
        <div id="inquiriesList"><div class="loading">Loading...</div></div>
      </div>

      <!-- TESTIMONIALS PANEL -->
      <div class="panel" id="panel-testimonials">
        <div class="panel-header">
          <h2>Client Reviews</h2>
          <button class="refresh-btn" onclick="loadTestimonials()">↻ Refresh</button>
        </div>
        <div id="testimonialsList"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = 'codeel2026';
    const WA_NUMBER = '26778753078';

    // ── AUTH ──
    function login() {
      const pw = document.getElementById('pwInput').value;
      if (pw === PASSWORD) {
        sessionStorage.setItem('codeel_admin', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadAll();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    function logout() {
      sessionStorage.removeItem('codeel_admin');
      location.reload();
    }

    // Auto-login if session active
    if (sessionStorage.getItem('codeel_admin')) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadAll();
    }

    // ── TABS ──
    function switchTab(name, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
    }

    // ── LOAD ALL ──
    function loadAll() {
      loadInquiries();
      loadTestimonials();
    }

    // ── INQUIRIES ──
    async function loadInquiries() {
      const el = document.getElementById('inquiriesList');
      el.innerHTML = '<div class="loading">Loading...</div>';
      try {
        const res = await fetch('/api/inquiries');
        const data = await res.json();
        document.getElementById('kpiInquiries').textContent = data.length;
        if (!data.length) { el.innerHTML = '<div class="empty">No inquiries yet.</div>'; return; }

        el.innerHTML = data.map(i => `
          <div class="item-card">
            <div class="item-meta">
              <span class="badge badge-type">${i.project_type || 'other'}</span>
              <span class="date">${formatDate(i.created_at)}</span>
            </div>
            <div class="item-text">${escHtml(i.features)}</div>
            <div class="budget-row">Budget: <span>BWP ${Number(i.budget || 0).toLocaleString()}</span></div>
            <div class="actions">
              <a href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent('Hi, I saw your inquiry on CodeEl — project type: ' + (i.project_type||'other') + '. Let\'s talk!')}" target="_blank" class="action-btn btn-whatsapp">💬 WhatsApp Client</a>
            </div>
          </div>
        `).join('');
      } catch {
        el.innerHTML = '<div class="empty">Failed to load inquiries.</div>';
      }
    }

    // ── TESTIMONIALS ──
    let testimonials = [];
    async function loadTestimonials() {
      const el = document.getElementById('testimonialsList');
      el.innerHTML = '<div class="loading">Loading...</div>';
      try {
        const res = await fetch('/api/testimonials?admin=true');
        testimonials = await res.json();

        const pending = testimonials.filter(t => !t.approved).length;
        const approved = testimonials.filter(t => t.approved).length;
        const rated = testimonials.filter(t => t.approved && t.rating);
        const avg = rated.length ? (rated.reduce((s, t) => s + t.rating, 0) / rated.length).toFixed(1) : '—';

        document.getElementById('kpiPending').textContent = pending;
        document.getElementById('kpiApproved').textContent = approved;
        document.getElementById('kpiRating').textContent = avg === '—' ? '—' : avg + ' ★';

        if (!testimonials.length) { el.innerHTML = '<div class="empty">No reviews yet.</div>'; return; }

        el.innerHTML = testimonials.map(t => `
          <div class="item-card" id="tc-${t.id}">
            <div class="item-meta">
              <span class="name">${escHtml(t.client_name)}</span>
              <span class="role">${escHtml(t.client_role || '')}</span>
              <span class="badge ${t.approved ? 'badge-approved' : 'badge-pending'}">${t.approved ? 'Approved' : 'Pending'}</span>
              <span class="date">${formatDate(t.created_at)}</span>
            </div>
            <div class="stars-row">${[1,2,3,4,5].map(i => `<span class="s ${i <= t.rating ? 'on' : 'off'}">★</span>`).join('')}</div>
            <div class="item-text">"${escHtml(t.message)}"</div>
            <div class="actions">
              ${t.approved
                ? `<button class="action-btn btn-unapprove" onclick="toggleApprove('${t.id}', false)">↩ Unapprove</button>`
                : `<button class="action-btn btn-approve" onclick="toggleApprove('${t.id}', true)">✓ Approve</button>`
              }
              <button class="action-btn btn-delete" onclick="deleteReview('${t.id}')">🗑 Delete</button>
            </div>
          </div>
        `).join('');
      } catch {
        el.innerHTML = '<div class="empty">Failed to load reviews.</div>';
      }
    }

    async function toggleApprove(id, approved) {
      await fetch('/api/testimonials', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, approved })
      });
      loadTestimonials();
    }

    async function deleteReview(id) {
      if (!confirm('Delete this review?')) return;
      await fetch('/api/testimonials', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      loadTestimonials();
    }

    // ── HELPERS ──
    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
