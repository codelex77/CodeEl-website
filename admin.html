<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeEl Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#040810;--bg2:#070d1a;--bg3:#0b1426;--surface:#0f1d35;--border:rgba(37,99,235,0.18);--blue:#2563eb;--blue-lt:#3b82f6;--cyan:#06b6d4;--silver:#94a3b8;--white:#f0f6ff;--muted:rgba(148,163,184,0.6);--green:#22c55e;--red:#ef4444;--gold:#f59e0b;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(37,99,235,0.2) 0%,transparent 70%),linear-gradient(180deg,#040d1f,#040810);}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,0.6);text-align:center;}
    .login-box h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;margin-bottom:6px;}
    .login-box p{color:var(--muted);font-size:.85rem;margin-bottom:32px;}
    .l-input{width:100%;background:#0a1628;border:1px solid rgba(37,99,235,0.3);color:var(--white);border-radius:10px;padding:13px 16px;font-size:.95rem;outline:none;margin-bottom:14px;transition:border-color .2s;font-family:'DM Sans',sans-serif;}
    .l-input:focus{border-color:var(--blue-lt);}
    .l-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;}
    .l-btn:hover{background:var(--blue-lt);}
    .l-err{color:#f87171;font-size:.82rem;margin-top:10px;display:none;}

    /* DASHBOARD */
    #dash{display:none;}
    .top-bar{background:rgba(4,8,16,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .tb-left{display:flex;align-items:center;gap:12px;}
    .tb-left img{height:34px;width:auto;}
    .tb-left span{font-size:.8rem;color:var(--muted);font-weight:500;}
    .logout{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171;padding:7px 16px;border-radius:8px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;}
    .logout:hover{background:rgba(239,68,68,0.22);}
    .main{max-width:1200px;margin:0 auto;padding:36px 24px;}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;margin-bottom:44px;}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;transition:border-color .3s;}
    .kpi:hover{border-color:rgba(37,99,235,0.4);}
    .kpi-lbl{font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .kpi-val{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--blue-lt);}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:0;}
    .tab{background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.04em;transition:all .2s;}
    .tab.on{color:var(--blue-lt);border-bottom-color:var(--blue);}
    .tab:hover:not(.on){color:rgba(148,163,184,0.8);}
    .panel{display:none;}
    .panel.on{display:block;}

    /* PANEL HEADER */
    .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .ph h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
    .ref-btn{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);color:var(--blue-lt);padding:7px 14px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
    .ref-btn:hover{background:rgba(59,130,246,0.22);}

    /* CARDS */
    .item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px;transition:border-color .2s;}
    .item:hover{border-color:rgba(37,99,235,0.35);}
    .item-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
    .iname{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
    .irole{color:var(--cyan);font-size:.78rem;}
    .idate{color:var(--muted);font-size:.72rem;margin-left:auto;}
    .badge{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:100px;letter-spacing:.05em;}
    .b-pend{background:rgba(245,158,11,0.12);color:var(--gold);border:1px solid rgba(245,158,11,0.25);}
    .b-appr{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
    .b-type{background:rgba(6,182,212,0.1);color:var(--cyan);border:1px solid rgba(6,182,212,0.2);text-transform:uppercase;}
    .itext{font-size:.85rem;color:rgba(240,246,255,0.7);line-height:1.65;margin-bottom:14px;}
    .ibudget{font-size:.83rem;color:var(--muted);margin-bottom:12px;}
    .ibudget strong{color:var(--green);}
    .iphone{font-size:.83rem;color:var(--muted);margin-bottom:12px;}
    .iphone strong{color:var(--white);}
    .stars-row{display:flex;gap:3px;margin-bottom:10px;}
    .sf{color:var(--gold);font-size:13px;}
    .se{color:#1e3a8a;font-size:13px;}
    .actions{display:flex;gap:9px;flex-wrap:wrap;}
    .act{padding:6px 14px;border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer;border:1px solid;font-family:'Syne',sans-serif;transition:all .2s;letter-spacing:.03em;}
    .act-appr{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25);color:var(--green);}
    .act-appr:hover{background:rgba(34,197,94,0.2);}
    .act-unappr{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);color:var(--gold);}
    .act-unappr:hover{background:rgba(245,158,11,0.2);}
    .act-del{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:#f87171;}
    .act-del:hover{background:rgba(239,68,68,0.2);}
    .act-wa{background:rgba(37,211,102,0.1);border-color:rgba(37,211,102,0.2);color:#25d366;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
    .act-wa:hover{background:rgba(37,211,102,0.18);}
    .empty{text-align:center;padding:56px;color:var(--muted);}
    .loading{text-align:center;padding:36px;color:var(--muted);font-size:.85rem;}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <h1>🔐 CodeEl Admin</h1>
      <p>Enter your password to access the dashboard</p>
      <input type="password" class="l-input" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
      <button class="l-btn" onclick="login()">Sign In</button>
      <p class="l-err" id="loginErr">Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <div class="top-bar">
      <div class="tb-left">
        <img src="/logo.png" alt="CodeEl" />
        <span>Admin Dashboard</span>
      </div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
    <div class="main">
      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-lbl">Total Inquiries</div><div class="kpi-val" id="kInq">—</div></div>
        <div class="kpi"><div class="kpi-lbl">Pending Reviews</div><div class="kpi-val" id="kPend">—</div></div>
        <div class="kpi"><div class="kpi-lbl">Approved Reviews</div><div class="kpi-val" id="kAppr">—</div></div>
        <div class="kpi"><div class="kpi-lbl">Avg Rating</div><div class="kpi-val" id="kRating">—</div></div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab on" onclick="switchTab('inq',this)">📋 Inquiries</button>
        <button class="tab" onclick="switchTab('rev',this)">⭐ Reviews</button>
      </div>

      <!-- INQUIRIES -->
      <div class="panel on" id="panel-inq">
        <div class="ph"><h2>Project Inquiries</h2><button class="ref-btn" onclick="loadInq()">↻ Refresh</button></div>
        <div id="inqList"><div class="loading">Loading...</div></div>
      </div>

      <!-- REVIEWS -->
      <div class="panel" id="panel-rev">
        <div class="ph"><h2>Client Reviews</h2><button class="ref-btn" onclick="loadRev()">↻ Refresh</button></div>
        <div id="revList"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </div>

  <script>
    const PW = 'codeel2026';
    const WA = '26778753078';

    /* AUTH */
    function login(){
      if(document.getElementById('pwInput').value===PW){
        sessionStorage.setItem('cel_admin','1');
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dash').style.display='block';
        loadAll();
      } else {
        document.getElementById('loginErr').style.display='block';
      }
    }
    function logout(){ sessionStorage.removeItem('cel_admin'); location.reload(); }
    if(sessionStorage.getItem('cel_admin')){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('dash').style.display='block';
      loadAll();
    }

    /* TABS */
    function switchTab(name,el){
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
      el.classList.add('on');
      document.getElementById('panel-'+name).classList.add('on');
    }

    function loadAll(){ loadInq(); loadRev(); }

    /* INQUIRIES */
    async function loadInq(){
      const el=document.getElementById('inqList');
      el.innerHTML='<div class="loading">Loading...</div>';
      try{
        const data=await(await fetch('/api/inquiries')).json();
        document.getElementById('kInq').textContent=data.length;
        if(!data.length){el.innerHTML='<div class="empty">No inquiries yet.</div>';return;}
        el.innerHTML=data.map(i=>`
          <div class="item">
            <div class="item-head">
              <span class="badge b-type">${i.project_type||'other'}</span>
              ${i.name?`<span class="iname">${esc(i.name)}</span>`:''}
              <span class="idate">${fmt(i.created_at)}</span>
            </div>
            ${i.phone?`<div class="iphone">📱 <strong>${esc(i.phone)}</strong></div>`:''}
            <div class="itext">${esc(i.features)}</div>
            <div class="ibudget">Budget: <strong>BWP ${Number(i.budget||0).toLocaleString()}</strong></div>
            <div class="actions">
              <a href="https://wa.me/${WA}?text=${encodeURIComponent('Hi '+( i.name||'there')+', I saw your inquiry on CodeEl about a '+( i.project_type||'project')+'. Let\'s chat!')}" target="_blank" class="act act-wa">💬 Reply on WhatsApp</a>
            </div>
          </div>`).join('');
      }catch{el.innerHTML='<div class="empty">Failed to load.</div>';}
    }

    /* REVIEWS */
    async function loadRev(){
      const el=document.getElementById('revList');
      el.innerHTML='<div class="loading">Loading...</div>';
      try{
        const data=await(await fetch('/api/testimonials?admin=true')).json();
        const pend=data.filter(t=>!t.approved).length;
        const appr=data.filter(t=>t.approved).length;
        const rated=data.filter(t=>t.approved&&t.rating);
        const avg=rated.length?(rated.reduce((s,t)=>s+t.rating,0)/rated.length).toFixed(1):'—';
        document.getElementById('kPend').textContent=pend;
        document.getElementById('kAppr').textContent=appr;
        document.getElementById('kRating').textContent=avg==='—'?'—':avg+' ★';
        if(!data.length){el.innerHTML='<div class="empty">No reviews yet.</div>';return;}
        el.innerHTML=data.map(t=>`
          <div class="item" id="tc-${t.id}">
            <div class="item-head">
              <span class="iname">${esc(t.client_name)}</span>
              <span class="irole">${esc(t.client_role||'')}</span>
              <span class="badge ${t.approved?'b-appr':'b-pend'}">${t.approved?'Approved':'Pending'}</span>
              <span class="idate">${fmt(t.created_at)}</span>
            </div>
            <div class="stars-row">${[1,2,3,4,5].map(i=>`<span class="${i<=t.rating?'sf':'se'}">★</span>`).join('')}</div>
            <div class="itext">"${esc(t.message)}"</div>
            <div class="actions">
              ${t.approved
                ?`<button class="act act-unappr" onclick="toggleAppr('${t.id}',false)">↩ Unapprove</button>`
                :`<button class="act act-appr" onclick="toggleAppr('${t.id}',true)">✓ Approve</button>`}
              <button class="act act-del" onclick="delRev('${t.id}')">🗑 Delete</button>
            </div>
          </div>`).join('');
      }catch{el.innerHTML='<div class="empty">Failed to load.</div>';}
    }

    async function toggleAppr(id,approved){
      await fetch('/api/testimonials',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,approved})});
      loadRev();
    }
    async function delRev(id){
      if(!confirm('Delete this review?'))return;
      await fetch('/api/testimonials',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
      loadRev();
    }

    /* HELPERS */
    function fmt(iso){ return iso?new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''; }
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
