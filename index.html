<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeEl | Premium Software Solutions</title>
  <style>
    :root {
      --primary: #2563eb; /* Electric Blue */
      --secondary: #8A2BE2; /* Neon Purple */
      --accent: #00d2ff;
      --bg: #0a0f1a;
      --card-bg: #0e1626;
      --text: #f8fafc;
      --text-dim: rgba(248, 250, 252, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth; }

    /* ── PREMIUM NAVBAR ── */
    header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(10, 15, 26, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    nav {
      max-width: 1200px; margin: 0 auto; padding: 0.8rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    /* Logo styling using your new asset */
    .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 45px; width: auto; }
    
    nav ul { display: flex; list-style: none; gap: 2rem; align-items: center; }
    nav a { text-decoration: none; color: var(--text-dim); font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
    nav a:hover { color: var(--accent); }
    .nav-cta { 
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        padding: 0.6rem 1.2rem; border-radius: 8px; color: white !important; 
    }

    /* ── HERO SECTION ── */
    .hero {
      height: 90vh; display: flex; align-items: center; justify-content: center;
      text-align: center; position: relative;
    }
    .hero-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 50%);
      z-index: -1;
    }
    h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; }
    .gradient-text {
      background: linear-gradient(to right, var(--accent), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 2.5rem; max-width: 700px; }

    /* ── S-RANK BUTTONS ── */
    .btn {
      padding: 1rem 2.5rem; border-radius: 12px; font-weight: 700; cursor: pointer;
      transition: 0.3s; text-decoration: none; border: none; display: inline-block;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(138, 43, 226, 0.4); }

    /* ── CONTACT FORM ── */
    .contact-section { background: #060c18; padding: 100px 2rem; }
    .form-container { 
        max-width: 600px; margin: 0 auto; background: var(--card-bg); 
        padding: 3rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05);
    }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; }
    input, textarea {
      width: 100%; padding: 1rem; background: #162035; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: white; outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--accent); }
    
    footer { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#" class="logo-container">
        <img src="logo.png" alt="CodeEl Logo" class="logo-img">
      </a>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact" class="nav-cta">Start Project</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div style="background: rgba(37,99,235,0.1); border: 1px solid var(--primary); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem; color: var(--accent); margin-bottom: 1.5rem; display: inline-block;">
        ● Now serving clients in Botswana
      </div>
      <h1>Building the <span class="gradient-text">Future</span> of Software.</h1>
      <p>Bespoke web and mobile solutions tailored for the next generation of business.</p>
      <a href="#contact" class="btn btn-primary">Get a Free Quote</a>
    </div>
  </section>

  <section class="contact-section" id="contact">
    <div class="form-container">
      <h2 style="margin-bottom: 2rem; text-align: center;">Launch Your Project</h2>
      
      <form action="https://formspree.io/f/mqakpeoz" method="POST">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required>
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="john@example.com" required>
        </div>
        <div class="input-group">
            <label>Project Goals</label>
            <textarea name="message" rows="4" placeholder="How can CodeEl help you grow?" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Inquiry</button>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 CodeEl Software Solutions. All rights reserved.</p>
  </footer>

</body>
</html>
