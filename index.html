<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeEl - Software Solutions</title>
    <style>
        /* [KEEP ALL YOUR EXISTING STYLES HERE] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1a1a1a; color: #e0e0e0; line-height: 1.6; }
        
        /* THE NEON BUTTON STYLING (ADD THIS) */
        .cta, #registrationForm button, #instant-register button {
            background: linear-gradient(135deg, #4a9eff, #8A2BE2) !important;
            color: white !important;
            border: none !important;
            padding: 15px 35px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(138, 43, 226, 0.3);
        }

        .cta:hover, #registrationForm button:hover, #instant-register button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(138, 43, 226, 0.5);
            filter: brightness(1.2);
        }

        /* [ADD THE REST OF YOUR CSS BELOW] */
        header { padding: 15px 50px; background: #0d1f33; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .hero { min-height: 100vh; display: flex; align-items: center; padding: 100px 50px; background: linear-gradient(135deg, #0d1f33, #1e3a5f); }
        .contact-form { background: #252525; padding: 40px; border-radius: 16px; border: 1px solid #333; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <nav style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <div class="logo"><span>CodeEl</span></div>
        <ul style="display: flex; list-style: none; gap: 30px;">
            <li><a href="#home" style="color: white; text-decoration: none;">Home</a></li>
            <li><a href="#services" style="color: white; text-decoration: none;">Services</a></li>
            <li><a href="#contact" style="color: white; text-decoration: none;">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero" id="home">
    <div class="hero-content" style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 50px;">
        <div class="hero-text">
            <h1>We Build <span>Websites & Apps</span> That Make You Money</h1>
            <p>Fast. Affordable. Built for growth.</p>
            <div class="cta-group">
                <button class="cta" onclick="document.getElementById('contact').scrollIntoView()">Get Started</button>
            </div>
        </div>
    </div>
</section>

<section class="contact" id="contact" style="padding: 80px 50px;">
    <div style="max-width: 800px; margin: 0 auto;">
        <h2 style="text-align: center; margin-bottom: 30px;">Start Your <span>Project</span></h2>
        <form id="registrationForm" class="contact-form">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="business_name" id="clientName" placeholder="Full Name or Business Name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" id="clientEmail" placeholder="email@example.com" required>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>
</section>

<footer style="text-align: center; padding: 40px; background: #0d0d0d;">
    <p>© 2026 CodeEl - Software Solutions</p>
</footer>

<script src="script.js"></script>
</body>
</html>
